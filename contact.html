<script>
    // Apply persisted theme before first paint to avoid flash.
    (function(){
        try {
            var t = sessionStorage.getItem('theme') || 'light';
            var h = document.documentElement;
            h.classList.toggle('dark', t === 'dark');
            h.classList.toggle('light', t !== 'dark');
        } catch (e) {}
    })();
</script>

<script id="tailwind-config">
        function copyToClipboard(text, element) {
            const feedback = element.querySelector('.copy-feedback');
            const handle = element.querySelector('span:first-child');

            const executeCopy = () => {
                feedback.classList.add('active');
                handle.classList.add('text-primary');
                handle.style.transform = 'scale(0.95)';
                
                setTimeout(() => {
                    feedback.classList.remove('active');
                    handle.classList.remove('text-primary');
                    handle.style.transform = '';
                }, 700);
            };

            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text).then(executeCopy);
            } else {
                // Fallback method
                const textArea = document.createElement("textarea");
                textArea.value = text;
                textArea.style.position = "fixed";
                textArea.style.left = "-999999px";
                textArea.style.top = "-999999px";
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();
                try {
                    document.execCommand('copy');
                    executeCopy();
                } catch (err) {
                    console.error('Fallback copy failed', err);
                }
                textArea.remove();
            }
        }
    </script>

<script>
        function copyToClipboard(text, element) {
            const feedback = element.querySelector('.copy-feedback');
            const handle = element.querySelector('span:first-child');

            const executeCopy = () => {
                feedback.classList.add('active');
                handle.classList.add('text-primary');
                handle.style.transform = 'scale(0.95)';

                setTimeout(() => {
                    feedback.classList.remove('active');
                    handle.classList.remove('text-primary');
                    handle.style.transform = '';
                }, 700);
            };

            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text).then(executeCopy);
            } else {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                textArea.style.position = "fixed";
                textArea.style.left = "-999999px";
                textArea.style.top = "-999999px";
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();
                try {
                    document.execCommand('copy');
                    executeCopy();
                } catch (err) {
                    console.error('Fallback copy failed', err);
                }
                textArea.remove();
            }
        }

        // Persist theme across page navigation via sessionStorage.
        // Fresh visits (no session) always start in light mode.
        (function(){
            const h = document.documentElement;
            let theme = 'light';
            try { theme = sessionStorage.getItem('theme') || 'light'; } catch (e) {}
            h.classList.toggle('dark', theme === 'dark');
            h.classList.toggle('light', theme !== 'dark');
        })();

        document.addEventListener('DOMContentLoaded', () => {
            const themeToggle = document.getElementById('theme-toggle');
            if (themeToggle) {
                const isDarkNow = document.documentElement.classList.contains('dark');
                themeToggle.setAttribute('aria-checked', String(isDarkNow));
                themeToggle.addEventListener('click', () => {
                    const isDark = document.documentElement.classList.toggle('dark');
                    document.documentElement.classList.toggle('light', !isDark);
                    themeToggle.setAttribute('aria-checked', String(isDark));
                    try { sessionStorage.setItem('theme', isDark ? 'dark' : 'light'); } catch (e) {}
                });
            }
        });
    </script>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=block" rel="stylesheet"/>
<script id="tailwind-config">
        function copyToClipboard(text, element) {
            const feedback = element.querySelector('.copy-feedback');
            const handle = element.querySelector('span:first-child');

            const executeCopy = () => {
                feedback.classList.add('active');
                handle.classList.add('text-primary');
                handle.style.transform = 'scale(0.95)';
                
                setTimeout(() => {
                    feedback.classList.remove('active');
                    handle.classList.remove('text-primary');
                    handle.style.transform = '';
                }, 700);
            };

            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text).then(executeCopy);
            } else {
                // Fallback method
                const textArea = document.createElement("textarea");
                textArea.value = text;
                textArea.style.position = "fixed";
                textArea.style.left = "-999999px";
                textArea.style.top = "-999999px";
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();
                try {
                    document.execCommand('copy');
                    executeCopy();
                } catch (err) {
                    console.error('Fallback copy failed', err);
                }
                textArea.remove();
            }
        }
    </script>

        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .liquid-glass {
            position: relative;
            overflow: hidden;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);

        .liquid-glass::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.25) 0%, rgba(255,255,255,0) 70%);

        .liquid-glass:hover {
            transform: translateY(-12px);
            box-shadow: 0 50px 100px -20px rgba(0,0,0,0.15), 0 30px 60px -30px rgba(0,0,0,0.2);
        }
        .liquid-glass:hover::before {
            transform: scale(1);
        }

        .copy-feedback {
            color: #777;

            font-family: 'Inter', sans-serif;
            font-weight: 400;

        .copy-feedback.active {
            opacity: 1;
            transform: translateY(0);
        }
    
        @keyframes revealText {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .reveal-anim {

        }
        .group\/handle span:first-child {

        }
    nav a:focus { outline: none !important; }</style>
